site_name: Math Foundations for Nursing
site_description: A free and open mathematics textbook for nursing students provided by Convergent Math.
site_url: https://nursing.convergentmath.com
theme:
  name: material
  font:
    text: Roboto
    code: Roboto Mono
  palette:
    - scheme: default
      primary: teal
      accent: cyan
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: teal
      accent: cyan
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - toc.integrate
    - content.code.copy


nav:
  - Home: index.md
  - M1 · Arithmetic:
    - Overview: module1/index.md
    - Whole Numbers: module1/whole-numbers.md
    - Fractions: module1/fractions.md
    - Decimals: module1/decimals.md
    - Rounding: module1/rounding.md
    - Percentages: module1/percentages.md
  
  - M2 · Units and Conversions:
    - Overview: module2/index.md
    - Metric System: module2/metric-system.md
    - Household Measurements: module2/household-measurements.md
    - Converting Between Units: module2/conversions.md
    - Dimensional Analysis: module2/dimensional-analysis.md
    
  - M3 · Ratio and Proportion:
    - Overview: module3/index.md
    - Ratios: module3/ratios.md
    - Proportions: module3/proportions.md
    - Unit Cancellation: module3/unit-cancellation.md
    - Clinical Applications: module3/clinical-applications.md
  
  
  - M4 · Dosage:
    - Overview: module4/index.md
    - Oral Medications: module4/oral-medications.md
    - Liquid Medications: module4/liquid-medications.md
    - Weight-Based Dosing: module4/weight-based-dosing.md
    - Pediatric Dosing: module4/pediatric-dosing.md
    
  - M5 · IV Rates:
    - Overview: module5/index.md
    - IV Flow Rates: module5/iv-flow-rates.md
    - Infusion Time: module5/infusion-time.md
    - Drip Rates: module5/drip-rates.md
    - IV Medications: module5/iv-medications.md
  
  - M6 · Wrap-Up:
    - Overview: module6/index.md
    - Practice Set 1: module6/practice-set-1.md
    - Practice Set 2: module6/practice-set-2.md
    - Answer Key: module6/answer-key.md
    
  - Interactive:
    - Overview: interactive/index.md


copyright: >
  © 2026 Carina Mata | Convergent Math
  <a href="https://creativecommons.org/licenses/by-nc/4.0/">CC BY-NC 4.0</a> — 
  Free for personal and non-commercial use.

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.arithmatex:
      generic: true
  - tables
  - toc:
      permalink: true

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js
